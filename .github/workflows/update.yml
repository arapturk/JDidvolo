name: Vavoo IPTV Auto Updater

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Vavoo Scriptini Çalıştır
      run: python vavoo_fetcher.py

    - name: Güncellenen Dosyaları GitHub'a Commit Et ve Pushla
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add -A
        
        if ! git diff --cached --quiet; then
          git commit -m "🔄 Güncelleme: Tüm dünya ve ülkeler m3u listeleri yenilendi"
          git push origin main || git push origin master
        else
          echo "🔄 Değişiklik yok."
        fi
