name: Vavoo IPTV Auto Updater

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Vavoo Scriptini Çalıştır
      run: python vavoo_fetcher.py

    - name: Güncellenen Dosyaları GitHub'a Commit Et ve Pushla
      run: |
        git config --local user.email "github-actions[bot]@://github.com"
        git config --local user.name "github-actions[bot]"
        git add vavoo_all_channels.m3u countries/*.m3u 2>/dev/null || true
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Güncelleme: Global ve Ülke Bazlı Vavoo Listeleri Yenilendi" && git push)
